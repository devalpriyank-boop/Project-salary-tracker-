<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Salary Expense Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>💰 Salary Expense Tracker</h1>

    <div class="salary-box">

        <input
            type="number"
            id="salaryInput"
            placeholder="Enter Monthly Salary"
        >

        <button id="saveSalary">
            Save Salary
        </button>

    </div>

    <div class="dashboard">

        <div class="card salary-card">
            <h3>Total Salary</h3>
            <p id="salaryAmount">₹0</p>
        </div>

        <div class="card spent-card">
            <h3>Total Spent</h3>
            <p id="spentAmount">₹0</p>
        </div>

        <div class="card remaining-card">
            <h3>Remaining</h3>
            <p id="remainingAmount">₹0</p>
        </div>

    </div>

    <h2>Add Expense</h2>

    <form id="expenseForm">

        <input
            type="text"
            id="expenseName"
            placeholder="Expense Name"
            required
        >

        <input
            type="number"
            id="expenseCost"
            placeholder="Amount"
            required
        >

        <button type="submit">
            Add Expense
        </button>

    </form>

    <h2>Expense History</h2>

    <table>

        <thead>
            <tr>
                <th>Expense</th>
                <th>Amount</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="expenseList"></tbody>

    </table>

</div>

<script src="script.js"></script>

</body>
</html>
